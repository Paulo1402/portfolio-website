{% load i18n language_switcher %}
{% get_current_language as LANGUAGE_CODE %}

<header>
    <nav class="navbar w-auto navbar-expand-lg fixed-top bg-primary-subtle" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="">Paulo Benatto</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'home' %}">Sobre mim</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'experiences' %}">Experiências</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'projects' %}">Projetos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'formation' %}">Formação</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'certifications' %}">Certificações</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'contact' %}">Contato</a>
                    </li>

                    <li class="nav-item py-2 py-lg-1 col-12 col-lg-auto">
                        <div class="vr d-none d-lg-flex h-100 mx-lg-2 text-white"></div>
                        <hr class="d-lg-none my-2 text-white-50">
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" role="button" id="bd-theme"
                           data-bs-toggle="dropdown" aria-expanded="false">
                            <i id="theme-icon"></i>
                            <span id="bd-theme-text" class="d-lg-none ms-2">Escolher tema</span>
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="bd-theme">
                            <li>
                                <a class="dropdown-item" role="button" id="theme-light" data-bs-theme-value="light">
                                    <i class="bi bi-brightness-alt-high-fill me-2"
                                       data-theme-icon="bi-brightness-alt-high-fill">
                                    </i>Claro
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" role="button" id="theme-dark" data-bs-theme-value="dark">
                                    <i class="bi bi-moon-stars-fill me-2"
                                       data-theme-icon="bi-moon-stars-fill">
                                    </i>Escuro
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" role="button" id="theme-dark" data-bs-theme-value="auto">
                                    <i class="bi bi-circle-half me-2"
                                       data-theme-icon="bi-circle-half">
                                    </i>Auto
                                </a>
                            </li>
                        </ul>
                    </li>

                    <li class="nav-item dropdown">
                        <button class="nav-link dropdown-toggle" type="button" id="bd-language"
                                data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-translate"></i>
                            <span id="language-label" class="d-lg-none ms-2">Idioma</span>
                        </button>
                        <ul class="dropdown-menu" aria-labelledby="bd-language"
                            data-current-language="{{ LANGUAGE_CODE }}"
                            data-pt-url="{% switch_language_url 'pt-br' %}"
                            data-en-url="{% switch_language_url 'en' %}">
                            <li>
                                <a class="dropdown-item" role="button" data-language="pt-br">
                                    <i class="bi bi-flag me-2"></i>Português
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" role="button" data-language="en">
                                    <i class="bi bi-flag-fill me-2"></i>English
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" role="button" data-language="auto">
                                    <i class="bi bi-magic me-2"></i>Auto
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
