name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: portfolio-website

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          echo "IMAGE_NAME=${OWNER,,}/${{ env.IMAGE_REPO }}" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image owner
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          echo "IMAGE_OWNER=${OWNER,,}" >> "$GITHUB_ENV"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add known_hosts (from secret, strip comments)
        run: |
          mkdir -p ~/.ssh
          # write known hosts, stripping leading comment lines (ssh-keyscan may include # metadata)
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" | sed '/^#/d' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          # show known_hosts fingerprints for audit (non-fatal)
          ssh-keygen -lf ~/.ssh/known_hosts || true

      - name: Upload deployment files
        run: |
          scp -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes \
            docker-compose.prod.yml \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.VPS_APP_DIR }}/docker-compose.yml"

          scp -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes \
            scripts/deploy-app.sh \
            "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}:${{ vars.VPS_APP_DIR }}/deploy-app.sh"

      - name: Deploy on VPS (pull SHA-tagged image)
        run: |
          ssh -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes "${{ vars.VPS_USER }}@${{ vars.VPS_HOST }}" "bash -se" <<EOF
            set -euo pipefail
            cd "${{ vars.VPS_APP_DIR }}"
            printf 'IMAGE_TAG=%s\nGITHUB_REPOSITORY_OWNER=%s\n' "${{ github.sha }}" "${{ env.IMAGE_OWNER }}" > .env.cicd
            chmod 600 .env.cicd || true
            chmod +x deploy-app.sh
            ./deploy-app.sh
          EOF
